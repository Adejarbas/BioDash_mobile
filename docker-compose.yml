services:
  # ==========================================
  # Backend Express (PostgreSQL RDS + MongoDB)
  # EC2: 98.92.12.89 — porta 3003
  # ==========================================
  biodash-backend:
    image: thiagohmn93/biodash_backend:latest
    build:
      context: ./backend
    ports:
      - "3003:3003"
    env_file:
      - ./backend/.env
    container_name: biodash_backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # Frontend Expo Web (Nginx)
  # EC2: 54.85.37.127 — porta 80
  # ==========================================
  biodash-mobile:
    image: thiagohmn93/biodash_mobile:latest
    build:
      context: .
      args:
        EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL}
    ports:
      - "80:80"
    container_name: biodash_mobile_web
    restart: unless-stopped
