services:
  biodash-mobile:
    image: thiagohmn93/biodash_mobile:latest
    build:
      context: .
      args:
        EXPO_PUBLIC_SUPABASE_URL: ${EXPO_PUBLIC_SUPABASE_URL}
        EXPO_PUBLIC_SUPABASE_ANON_KEY: ${EXPO_PUBLIC_SUPABASE_ANON_KEY}
    ports:
      - "8080:80"
    container_name: biodash_mobile_web
